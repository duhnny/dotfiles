# general
general {
    hide_cursor = true
    grace = 0
}

# animations
animation {
    animation = fade, 1, 5, linear
}

# background
background {
    monitor =
    path = screenshot
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 3
    blur_size = 5
    noise = 0.015
    brightness = 1.2
    contrast = 1.2
    vibrancy = 1.3
    vibrancy_darkness = 0.1
}

shape {
    size = 100%, 100%
    color = rgba(50, 50, 50, 0.1)
}

# input
input-field {
    monitor =
    size = 300, 55
    outline_thickness = 4
    position = 0, -235
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(242, 243, 244, 0.90)
    inner_color = rgba(242, 243, 244, 0.90)
    font_family = Adwaita Sans
    font_color = rgb(121212)
    fade_on_empty = false
    placeholder_text = <span foreground="##121212" font-size="14pt">󰌾  Logged in as $USER</span>
    hide_input = false
    check_color = rgba(242, 243, 244, 0.50)
    fail_color = rgba(e64c4cee)
    fail_text = <span foreground="##e64c4cff" font-size="14pt">  $FAIL</span>
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 3
    shadow_boost = 0.3
}

# date
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = rgba(242, 243, 244, 0.9)
  font_size = 25
  font_family = Adwaita Sans
  position = 0, 120
  halign = center
  valign = center
  shadow_passes = 3
  shadow_size = 6
  shadow_boost = 0.5
}

# time
label {
  monitor = 
  text = cmd[update:1000] echo "$(date +"%H:%M")"
  color = rgba(242, 243, 244, 0.9)
  font_size = 135
  font_family = Adwaita Sans Extrabold
  position = 0, -10
  halign = center
  valign = center
  shadow_passes = 3
  shadow_size = 6
  shadow_boost = 0.3
}
